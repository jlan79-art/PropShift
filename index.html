<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropShift — Smart Prop Betting Decisions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline { 
            font-size: 1.2rem; 
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .controls {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .sport-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .sport-btn.active, .sport-btn:hover {
            background: #ffd700;
            color: #1e3c72;
            transform: translateY(-2px);
        }
        .refresh-btn {
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4aa, #00b894);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .props-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .prop-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .prop-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .prop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .player-name { 
            font-size: 1.4rem; 
            font-weight: 700; 
        }
        .line-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd700;
        }
        
        .decision-badge {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
        }
        .bet-now { background: #00d4aa; color: #000; }
        .wait { background: #ffed4e; color: #000; }
        .avoid { background: #ff6b6b; color: white; }
        
        .quality-score {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .score-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }
        .score-90 { background: linear-gradient(45deg, #00d4aa, #00b894); }
        .score-70 { background: linear-gradient(45deg, #ffd700, #ffed4e); }
        .score-low { background: linear-gradient(45deg, #ff6b6b, #ff8e8e); }
        
        .movement-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.95rem;
        }
        .movement-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .public-money { background: rgba(255,107,107,0.3); color: #ff6b6b; }
        .sharp-action { background: rgba(0,212,170,0.3); color: #00d4aa; }
        .peak-line { background: rgba(255,107,107,0.3); color: #ff6b6b; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.7;
        }
        @media (max-width: 768px) {
            .props-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PropShift</h1>
            <p class="tagline">Smart Decisions, Not Just Data</p>
        </div>
        
        <div class="controls">
            <button class="sport-btn" data-sport="nfl">NFL</button>
            <button class="sport-btn" data-sport="nba">NBA</button>
            <button class="sport-btn" data-sport="mlb">MLB</button>
            <button class="sport-btn active" data-sport="nfl">Props</button>
            <button class="refresh-btn" onclick="loadProps()">🔄 Refresh Props</button>
        </div>
        
        <div id="props-container" class="props-grid">
            <div class="empty-state">
                <h3>Select a sport and refresh to see live prop analysis</h3>
                <p>PropShift analyzes line movement, volatility, and market signals to tell you exactly when to bet.</p>
            </div>
        </div>
    </div>

    <script>
        let currentSport = 'nfl';
        let propsData = [];
        
        // Sample data structure - replace with your API
        const sampleProps = {
            nfl: [
                {
                    player: "Christian McCaffrey Rush Yards",
                    currentLine: "85.5",
                    openLine: "78.5",
                    movement: "+7.0",
                    qualityScore: 92,
                    decision: "bet-now",
                    tags: ["sharp-action"],
                    explanation: "Line moving up fast on sharp money, great entry before it hits 90+"
                },
                {
                    player: "Patrick Mahomes Pass Yards", 
                    currentLine: "285.5",
                    openLine: "292.5",
                    movement: "-7.0",
                    qualityScore: 68,
                    decision: "wait",
                    tags: ["public-money"],
                    explanation: "Public piling in, line inflated - wait for reversal"
                },
                {
                    player: "Tyreek Hill Rec Yards",
                    currentLine: "92.5",
                    openLine: "88.5", 
                    movement: "+4.0",
                    qualityScore: 45,
                    decision: "avoid",
                    tags: ["peak-line", "public-money"],
                    explanation: "Peak public line, historically poor entry point"
                }
            ],
            nba: [
                // Add NBA sample data
            ]
        };

        document.querySelectorAll('.sport-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSport = btn.dataset.sport;
                loadProps();
            });
        });

        function loadProps() {
            document.getElementById('props-container').innerHTML = 
                '<div class="empty-state"><p>Loading props...</p></div>';
            
            // Simulate API delay
            setTimeout(() => {
                displayProps(sampleProps[currentSport] || []);
            }, 800);
        }

        function displayProps(props) {
            const container = document.getElementById('props-container');
            
            if (!props.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No props available</h3>
                        <p>Check back later for ${currentSport.toUpperCase()} analysis</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = props.map(prop => `
                <div class="prop-card">
                    <div class="prop-header">
                        <div class="player-name">${prop.player}</div>
                        <div class="line-display">${prop.currentLine}</div>
                    </div>
                    
                    <div class="decision-badge ${prop.decision}">
                        ${prop.decision === 'bet-now' ? '🔥 BET NOW' : 
                          prop.decision === 'wait' ? '⏳ WAIT' : '⚠️ AVOID'}
                    </div>
                    
                    <div class="quality-score">
                        <div class="score-circle score-${prop.qualityScore >= 90 ? '90' : prop.qualityScore >= 70 ? '70' : 'low'}">
                            ${prop.qualityScore}
                        </div>
                        <div>
                            <div>Quality Score</div>
                            <div style="font-size: 0.9rem; opacity: 0.8;">${prop.explanation}</div>
                        </div>
                    </div>
                    
                    <div class="movement-info">
                        <div>Open: ${prop.openLine} → Current: ${prop.currentLine} 
                            <span style="color: ${prop.movement.startsWith('+') ? '#00d4aa' : '#ff6b6b'}">
                                (${prop.movement})
                            </span>
                        </div>
                        <div>
                            ${prop.tags.map(tag => 
                                `<span class="movement-tag ${tag}">#${tag.replace('-', ' ')}</span>`
                            ).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Load initial data
        loadProps();
    </script>
</body>
</html>
