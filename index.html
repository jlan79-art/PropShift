<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropShift — Smart Prop Betting Decisions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline { 
            font-size: 1.2rem; 
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .premium-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #1e3c72;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-left: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 5px #ffd700; }
            to { box-shadow: 0 0 20px #ffd700; }
        }
        
        .controls {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .sport-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .sport-btn.active, .sport-btn:hover {
            background: #ffd700;
            color: #1e3c72;
            transform: translateY(-2px);
        }
        .refresh-btn {
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4aa, #00b894);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .props-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .prop-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .prop-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4aa, #ffd700, #ff6b6b);
        }
        .prop-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .premium-lock {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,215,0,0.9);
            color: #1e3c72;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .prop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .player-name { 
            font-size: 1.4rem; 
            font-weight: 700; 
        }
        .line-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd700;
        }
        
        .decision-badge {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .bet-now { background: linear-gradient(45deg, #00d4aa, #00b894); color: #000; }
        .wait { background: linear-gradient(45deg, #ffd700, #ffed4e); color: #000; }
        .avoid { background: linear-gradient(45deg, #ff6b6b, #ff8e8e); color: white; }
        
        .quality-score {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .score-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .score-90 { background: linear-gradient(45deg, #00d4aa, #00b894); }
        .score-70 { background: linear-gradient(45deg, #ffd700, #ffed4e); }
        .score-low { background: linear-gradient(45deg, #ff6b6b, #ff8e8e); }
        
        .edge-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .edge-positive { color: #00d4aa; font-weight: 700; }
        .edge-negative { color: #ff6b6b; }
        .urgent {
            color: #ffd700 !important;
            font-weight: 800;
            font-size: 1.1rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .movement-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.95rem;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
        }
        .movement-tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        .public-money { background: rgba(255,107,107,0.3); color: #ff6b6b; }
        .sharp-action { background: rgba(0,212,170,0.4); color: #00d4aa; }
        .peak-line { background: rgba(255,107,107,0.3); color: #ff6b6b; }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.8;
        }
        .premium-cta {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #1e3c72;
            padding: 20px 40px;
            border-radius: 25px;
            text-align: center;
            margin-top: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .premium-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,215,0,0.4);
        }
        
        @media (max-width: 768px) {
            .props-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: center; }
            .edge-info { flex-direction: column; gap: 10px; text-align: center; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PropShift <span class="premium-badge">PREMIUM</span></h1>
            <p class="tagline">Smart Decisions, Not Just Data — Unlock Pro Edge Now</p>
        </div>
        
        <div class="controls">
            <button class="sport-btn" data-sport="nfl">🏈 NFL</button>
            <button class="sport-btn" data-sport="nba">🏀 NBA</button>
            <button class="sport-btn" data-sport="mlb">⚾ MLB</button>
            <button class="sport-btn active" data-sport="nfl">📊 Props</button>
            <button class="refresh-btn" onclick="loadProps()">🔄 Live Refresh</button>
        </div>
        
        <div id="props-container" class="props-grid">
            <div class="empty-state">
                <h3>⚡ Live Prop Analysis Engine</h3>
                <p>PropShift processes line movement, sharp action, and market signals in real-time to deliver BET NOW / WAIT / AVOID decisions.</p>
                <div class="premium-cta" onclick="showPremium()">
                    🚀 Unlock Unlimited Props — $9/mo
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSport = 'nfl';
        let freePropsShown = 0;
        const MAX_FREE_PROPS = 3;
        
        // Expanded sample data - REPLACE WITH YOUR API
        const sampleProps = {
            nfl: [
                { player: "Christian McCaffrey Rush Yards", currentLine: "85.5", openLine: "78.5", movement: "+7.0", tags: ["sharp-action"], lastUpdated: Date.now() - 5*60*1000 },
                { player: "Patrick Mahomes Pass Yards", currentLine: "285.5", openLine: "292.5", movement: "-7.0", tags: ["public-money"], lastUpdated: Date.now() - 10*60*1000 },
                { player: "Tyreek Hill Rec Yards", currentLine: "92.5", openLine: "88.5", movement: "+4.0", tags: ["peak-line", "public-money"], lastUpdated: Date.now() - 2*60*1000 },
                { player: "Saquon Barkley Rush Yards", currentLine: "72.5", openLine: "68.5", movement: "+4.0", tags: ["sharp-action"], lastUpdated: Date.now() - 8*60*1000 },
                { player: "CeeDee Lamb Rec Yards", currentLine: "68.5", openLine: "72.5", movement: "-4.0", tags: ["public-money"], lastUpdated: Date.now() - 3*60*1000 }
            ],
            nba: [
                { player: "Jayson Tatum Points", currentLine: "28.5", openLine: "26.5", movement: "+2.0", tags: ["sharp-action"], lastUpdated: Date.now() - 8*60*1000 },
                { player: "Luka Doncic Points", currentLine: "32.5", openLine: "34.5", movement: "-2.0", tags: ["public-money"], lastUpdated: Date.now() - 12*60*1000 }
            ],
            mlb: [
                { player: "Shohei Ohtani Strikeouts", currentLine: "7.5", openLine: "6.5", movement: "+1.0", tags: ["sharp-action"], lastUpdated: Date.now() - 6*60*1000 }
            ]
        };

        // 🔥 PRO DECISION ENGINE
        function calculateQualityScore(prop) {
            let score = 50;
            const movement = parseFloat(prop.movement.replace('+', '')) || 0;
            const movementPct = Math.abs(movement) / parseFloat(prop.openLine) * 100;
            
            if (Math.abs(movement) > 5) score += 25;
            if (prop.movement.startsWith('-')) score += 20;
            if (movementPct > 8) score += 15;
            if (prop.tags?.includes('sharp-action')) score += 30;
            if (prop.tags?.includes('public-money')) score -= 25;
            if (prop.tags?.includes('peak-line')) score -= 35;
            
            return Math.min(100, Math.max(0, score));
        }

        function getDecision(prop) {
            const score = calculateQualityScore(prop);
            const movementSpeed = Math.abs(parseFloat(prop.movement));
            const isRecent = (Date.now() - (prop.lastUpdated || 0)) < 20 * 60 * 1000;
            
            if (score >= 85 || (movementSpeed > 6 && prop.movement.startsWith('-'))) {
                return { decision: 'bet-now', reason: 'Sharp value window opening' };
            } else if (score >= 65 || (score >= 55 && isRecent)) {
                return { decision: 'wait', reason: 'Monitor for optimal entry' };
            } else {
                return { decision: 'avoid', reason: 'Poor entry point detected' };
            }
        }

        function isUrgent(prop) {
            const movement = Math.abs(parseFloat(prop.movement));
            return movement > 4 || (Date.now() - (prop.lastUpdated || 0)) < 10 * 60 * 1000;
        }

        function calculateEdge(prop) {
            const score = calculateQualityScore(prop);
            return ((score - 50) / 50 * 8).toFixed(1);
        }

        // UI HANDLERS
        document.querySelectorAll('.sport-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSport = btn.dataset.sport;
                loadProps();
            });
        });

        function showPremium() {
            alert('🚀 PropShift Premium\n\n$9/mo → Unlimited props + real-time alerts\nComing soon to Stripe!');
        }

        function loadProps() {
            document.getElementById('props-container').innerHTML = 
                '<div class="empty-state"><p>🔬 AI Decision Engine Processing...</p></div>';
            
            setTimeout(() => {
                const rawProps = sampleProps[currentSport] || [];
                displayProps(rawProps);
            }, 1200);
        }

        function displayProps(rawProps) {
            const container = document.getElementById('props-container');
            freePropsShown++;
            
            if (!rawProps.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No live props</h3>
                        <p>${currentSport.toUpperCase()} action coming soon</p>
                        <div class="premium-cta" onclick="showPremium()">Unlock All Sports →</div>
                    </div>
                `;
                return;
            }

            // Freemium: Show first 3 free, lock rest
            const displayProps = rawProps.slice(0, freePropsShown > 3 ? 3 : rawProps.length);
            
            container.innerHTML = displayProps.map((prop, index) => {
                if (index >= 3) {
                    return `
                        <div class="prop-card">
                            <div class="premium-lock">🔒 PREMIUM</div>
                            <div style="text-align: center; padding: 40px;">
                                <h3>Prop ${index + 1}</h3>
                                <p style="margin: 20px 0;">Unlimited analysis unlocked with Premium</p>
                                <div class="premium-cta" onclick="showPremium()" style="font-size: 1rem;">Get Premium $9/mo</div>
                            </div>
                        </div>
                    `;
                }

                const analysis = getDecision(prop);
                const edge = calculateEdge(prop);
                const urgent = isUrgent(prop);
                const qualityScore = Math.round(calculateQualityScore(prop));
                
                return `
                    <div class="prop-card">
                        <div class="prop-header">
                            <div class="player-name">${prop.player}</div>
                            <div class="line-display">${prop.currentLine}</div>
                        </div>
                        
                        <div class="decision-badge ${analysis.decision}">
                            ${analysis.decision === 'bet-now' ? '🔥 BET NOW' : 
                              analysis.decision === 'wait' ? '⏳ WAIT' : '⚠️ AVOID'}
                        </div>
                        
                        <div class="quality-score">
                            <div class="score-circle score-${analysis.decision === 'bet-now' ? '90' : 
                                                           analysis.decision === 'wait' ? '70' : 'low'}">
                                ${qualityScore}
                            </div>
                            <div>
                                <div style="font-size: 0.95rem; opacity: 0.9;">Quality Score</div>
                                <div style="font-size: 0.85rem; opacity: 0.8; margin-top: 4px;">${analysis.reason}</div>
                            </div>
                        </div>
                        
                        <div class="edge-info">
                            <span class="${parseFloat(edge) > 0 ? 'edge-positive' : 'edge-negative'}">
                                Edge: ${edge > 0 ? '+' : ''}${edge}%
                            </span>
                            <span class="${urgent ? 'urgent' : ''}">
                                ${urgent ? '⚡ MOVING FAST' : '📊 Stable'}
                            </span>
                        </div>
                        
                        <div class="movement-info">
                            <div><strong>Open → Current:</strong> ${prop.openLine} → ${prop.currentLine} 
                                <span style="color: ${prop.movement.startsWith('+') ? '#00d4aa' : '#ff6b6b'}; font-weight: 700;">
                                    (${prop.movement})
                                </span>
                            </div>
                            <div>
                                ${prop.tags?.map(tag => 
                                    `<span class="movement-tag ${tag}">${tag.replace('-', ' ').toUpperCase()}</span>`
                                ).join(' ')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('') + (rawProps.length > 3 ? `
                <div class="prop-card">
                    <div class="premium-lock">🔒 PREMIUM</div>
                    <h3 style="text-align: center; margin-bottom: 20px;">+${rawProps.length - 3} More Props</h3>
                    <div style="text-align: center;">
                        <p>Live analysis for every major prop market</p>
                        <div class="premium-cta" onclick="showPremium()">Unlock All → $9/mo</div>
                    </div>
                </div>
            ` : '');
        }

        // Auto-refresh every 75 seconds when visible
        setInterval(() => {
            if (document.visibilityState === 'visible') {
                loadProps();
            }
        }, 75000);

        // Initial load
        loadProps();
    </script>
</body>
</html>
